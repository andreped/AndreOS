name: Assistant Evals

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  deterministic-evals:
    name: Deterministic evals (retrieval · resolution · integrity)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run deterministic eval suite
        run: npm run eval

      - name: Upload scorecard
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-scorecard
          path: tests/evals/results/latest.json
